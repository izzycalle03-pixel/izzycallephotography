<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izzy Calle Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EDEBE3;
      --black: #0E0E0D;
      --mid:   #888880;
      --line:  rgba(14,14,13,0.1);
      --nav-h: 58px;
    }

    html, body {
      font-family: 'Syne', sans-serif;
      background: var(--cream);
      color: var(--black);
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 3.5rem);
      background: var(--cream);
      border-bottom: 1px solid var(--line);
      z-index: 200;
    }

    .brand {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--black); }

    .page-label {
      position: fixed;
      top: var(--nav-h);
      left: clamp(1.5rem, 4vw, 3.5rem);
      padding-top: 2.5rem;
      font-size: clamp(5rem, 14vw, 15rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.85;
      color: rgba(14,14,13,0.25);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    .portfolio-wrap {
      padding-top: calc(var(--nav-h) + 2rem);
      padding-bottom: 56px;
      min-height: 100vh;
    }

    .filters {
      display: flex;
      gap: 0;
      padding: 0 clamp(1.5rem, 4vw, 3.5rem);
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .f-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      background: transparent;
      border: 1px solid var(--line);
      border-right: none;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .f-btn:last-child { border-right: 1px solid var(--line); }
    .f-btn.active, .f-btn:hover {
      background: var(--black);
      color: var(--cream);
      border-color: var(--black);
    }

    .masonry {
      columns: 3 240px;
      column-gap: 10px;
      padding: 0 clamp(1.5rem, 4vw, 3.5rem);
      position: relative;
      z-index: 1;
    }

    .m-item {
      break-inside: avoid;
      margin-bottom: 10px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      aspect-ratio: 3 / 4;
    }

    .m-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.45s ease;
    }

    .m-item:hover img { transform: scale(1.03); }

    .m-item .cap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 0.9rem 0.75rem;
      background: linear-gradient(transparent, rgba(14,14,13,0.45));
      font-size: 0.56rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(237,235,227,0.9);
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.3s;
    }

    .m-item:hover .cap { opacity: 1; transform: translateY(0); }

    .m-item.hidden { display: none; }

    .tagline-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 4vw, 3.5rem);
      background: var(--cream);
      border-top: 1px solid var(--line);
      z-index: 200;
    }

    .tagline-bar span {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
    }

    @media (max-width: 700px) {
      .masonry { columns: 2 160px; }
    }

    @media (max-width: 420px) {
      .masonry { columns: 1; }
    }

    .lb {
      position: fixed;
      inset: 0;
      background: rgba(14,14,13,0.94);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .lb.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      position: relative;
      max-width: 85vw;
      max-height: 90vh;
    }

    .lb-inner img {
      max-width: 85vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: -2rem; right: 0;
      background: none; border: none;
      color: rgba(237,235,227,0.4);
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }

    .lb-close:hover { color: var(--cream); }

    .hamburger {
      display: none;
      background: none; border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 20px; height: 1px;
      background: var(--black);
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: fixed;
        inset: var(--nav-h) 0 0 0;
        background: var(--cream);
        align-items: center; justify-content: center;
        gap: 2.5rem; z-index: 150;
      }
      .nav-links.open a { font-size: 1.1rem; }
      .page-label { font-size: clamp(3rem, 20vw, 6rem); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="brand">Izzy Calle Photography</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="active">Portfolio</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" id="ham" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-label" aria-hidden="true">Portfolio</div>

  <div class="portfolio-wrap">
    <div class="filters">
      <button class="f-btn active" data-f="all">All</button>
      <button class="f-btn" data-f="portrait">Portrait</button>
      <button class="f-btn" data-f="lifestyle">Lifestyle</button>
      <button class="f-btn" data-f="commercial">Commercial</button>
    </div>

    <div class="masonry" id="masonry">
      <div class="m-item" data-cat="portrait">
        <img src="IMG_0912.jpg" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="DSCF0968-5.JPG" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="_DSC0857.JPG" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="IMG_0303.jpg" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="DSCF0814.JPG" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="DSCF0557.JPG" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="DSCF0969.jpg" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
      <div class="m-item" data-cat="portrait">
        <img src="DSCF0910-2.JPG" alt="Portrait" />
        <div class="cap">Portrait</div>
      </div>
    </div>
  </div>

  <div class="tagline-bar">
    <span>Los Angeles, CA</span>
    <span>Portrait · Lifestyle · Commercial</span>
    <span>© 2026 Izzy Calle</span>
  </div>

  <div class="lb" id="lb">
    <div class="lb-inner">
      <button class="lb-close" id="lbClose">Close ×</button>
      <img id="lbImg" src="" alt="" />
    </div>
  </div>

  <script>
    const ham = document.getElementById('ham');
    const navLinks = document.getElementById('navLinks');
    ham.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

    document.querySelectorAll('.f-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.f;
        document.querySelectorAll('.m-item').forEach(item => {
          const match = f === 'all' || item.dataset.cat === f;
          item.classList.toggle('hidden', !match);
        });
      });
    });

    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');

    document.querySelectorAll('.m-item').forEach(item => {
      item.addEventListener('click', () => {
        lbImg.src = item.querySelector('img').src;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    const closeLb = () => { lb.classList.remove('open'); document.body.style.overflow = ''; lbImg.src = ''; };
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>
</body>
</html>
